# ==========================================
# iStoreOS-Flow 传感器与控制配置文件
# 作者：https://github.com/Rabbit-Spec
# 版本：1.3.2
# 日期：2026.03.06
# ==========================================

# 1. 命令行服务：定义 Home Assistant 可以执行的外部指令
shell_command:
  update_istoreos_flow: "sh /config/shell/istoreos_flow.sh fetch"   # 触发脚本去抓取数据
  reboot_istoreos_flow: "sh /config/shell/istoreos_flow.sh reboot"  # 触发脚本去重启路由器

# 2. 自动化规则：决定什么时候去抓取数据
automation:
  - alias: "iStoreOS-Flow 自动同步"
    trigger:
      - platform: time_pattern
        seconds: "/10"      # 每隔 10 秒钟执行一次
      - platform: homeassistant
        event: start        # 当 Home Assistant 启动时也执行一次
    action:
      - service: shell_command.update_istoreos_flow

# 3. 命令行传感器：直接读取脚本产生的数据
command_line:
  - sensor:
      name: iStoreOS Flow Data
      command: "cat /config/shell/istoreos_flow.json" # 读取那个包含所有数据的 JSON 文件
      scan_interval: 10
      value_template: "OK"
      # 将 JSON 文件里的所有字段拆解成这个传感器的附加属性 (Attributes)
      json_attributes: [uptime, mode, ip, mem_total, mem_free, load, temp, devices, wan_rx, wan_tx, fw_ver, ports, disks, ping]
  
  - sensor:
      name: iStoreOS Proxy Raw State
      command: "sh /config/shell/istoreos_flow.sh proxy_state" # 单独读取代理插件的状态
      scan_interval: 10

# 4. 模板传感器：对原始数据进行二次加工、换算和美化
template:
  - sensor:
      # 提取代理软件名称，比如把 "ON_PassWall" 变成 "PassWall"
      - name: "istoreos_proxy_status"
        state: >
          {% set ps = states('sensor.istoreos_proxy_raw_state') %}
          {% if ps and ps.startswith('ON_') %}
            {{ ps.split('_')[1] }}
          {% else %}
            未启用
          {% endif %}

      # 读取并展示 Ping 延迟数值
      - name: "istoreos_latency"
        unit_of_measurement: "ms"
        state: "{{ state_attr('sensor.istoreos_flow_data', 'ping') | float(0) }}"

      # 将 mode 翻译成中文
      - name: "istoreos_mode_display"
        state: >
          {% set m = state_attr('sensor.istoreos_flow_data', 'mode') %}
          {{ '主路由模式' if m == 'main' else '旁路由模式' }}

      # 截取固件版本的最后一部分
      - name: "istoreos_firmware_version"
        state: >
          {% set version = state_attr('sensor.istoreos_flow_data', 'fw_ver') %}
          {{ version.split(' ') [-1] if version else '未知' }}

      # 计算 CPU 负载百分比 (依据 OpenWrt 的负载计算公式)
      - name: "istoreos_cpu"
        unit_of_measurement: "%"
        state: "{{ (state_attr('sensor.istoreos_flow_data', 'load') | float(0) / 655.36) | round(1) }}"

      # 温度直接读取展示
      - name: "istoreos_temperature_cpu"
        unit_of_measurement: "°C"
        state: "{{ state_attr('sensor.istoreos_flow_data', 'temp') | float(0) }}"

      # 计算内存使用率：(总内存 - 空闲内存) / 总内存
      - name: "istoreos_ram"
        unit_of_measurement: "%"
        state: >
          {% set total = state_attr('sensor.istoreos_flow_data', 'mem_total') | float(0) %}
          {% set free = state_attr('sensor.istoreos_flow_data', 'mem_free') | float(0) %}
          {{ ((total - free) / total * 100) | round(1) if total > 0 else 0 }}

      # 计算系统盘使用率
      - name: "istoreos_disk"
        unit_of_measurement: "%"
        state: >
          {% set total = state_attr('sensor.istoreos_flow_data', 'disk_total') | float(0) %}
          {% set free = state_attr('sensor.istoreos_flow_data', 'disk_free') | float(0) %}
          {{ ((total - free) / total * 100) | round(1) if total > 0 else 0 }}

      # 原始的上传/下载字节数
      - name: "istoreos_wan_rx_bytes"
        state: "{{ state_attr('sensor.istoreos_flow_data', 'wan_rx') }}"
        unit_of_measurement: "B"
      - name: "istoreos_wan_tx_bytes"
        state: "{{ state_attr('sensor.istoreos_flow_data', 'wan_tx') }}"
        unit_of_measurement: "B"

      # 将字节数换算为 GB (用于显示总计流量)
      - name: "istoreos_wan_download"
        unit_of_measurement: "GB"
        state: "{{ (state_attr('sensor.istoreos_flow_data', 'wan_rx') | float(0) / 1073741824) | round(2) }}"
      - name: "istoreos_wan_upload"
        unit_of_measurement: "GB"
        state: "{{ (state_attr('sensor.istoreos_flow_data', 'wan_tx') | float(0) / 1073741824) | round(2) }}"

      # 当前连接设备数
      - name: "istoreos_connected_devices"
        state: "{{ state_attr('sensor.istoreos_flow_data', 'devices') | default(0) }}"
        
      # 将秒级运行时间换算为 "天 时 分" 的友好格式
      - name: "istoreos_uptime_formatted"
        state: >
          {% set uptime = state_attr('sensor.istoreos_flow_data', 'uptime') | int(0) %}
          {% set days = uptime // 86400 %}
          {% set hours = (uptime % 86400) // 3600 %}
          {% set minutes = (uptime % 3600) // 60 %}
          {{ days }} 天 {{ hours }} 时 {{ minutes }} 分

      # --- 修复：从底部迁移过来的新版网速换算传感器 ---
      - name: "istoreos_wan_download_speed"
        unit_of_measurement: "Mbps"
        state: "{{ [ (states('sensor.istoreos_wan_download_speed_raw') | float(0) * 8 / 1000000) | round(2), 0 ] | max }}"

      - name: "istoreos_wan_upload_speed"
        unit_of_measurement: "Mbps"
        state: "{{ [ (states('sensor.istoreos_wan_upload_speed_raw') | float(0) * 8 / 1000000) | round(2), 0 ] | max }}"

# 5. 衍生传感器：用于计算实时网速
sensor:
  # 将累加的总下载字节数转换为每秒下载字节数 (B/s)
  - platform: derivative
    source: sensor.istoreos_wan_rx_bytes
    name: istoreos_wan_download_speed_raw
    unit_time: s
    unit: B/s
  # 将累加的总上传字节数转换为每秒上传字节数 (B/s)
  - platform: derivative
    source: sensor.istoreos_wan_tx_bytes
    name: istoreos_wan_upload_speed_raw
    unit_time: s
    unit: B/s